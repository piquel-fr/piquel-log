[package]
name = "piquel-log"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/piquel-fr/piquel-log"
rust-version = "1.94.0"
version = "0.1.0"
documentation = "https://docs.rs/piquel-log"
homepage = "https://piquel.fr" # TODO: should piquel.fr/piqueld of dirkengine.fr
authors = ["Piquel <contact@piquel.fr>"]

[dependencies]

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
pedantic = "warn"
unwrap_used = "warn"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["-Zunstable-options", "--cfg", "docsrs"]
