[package]
name = "piquel-log"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/piquel-fr/piquel-log"
rust-version = "1.94.0"
version = "0.0.1"
documentation = "https://docs.rs/piquel-log"
homepage = "https://piquel.fr" # TODO: should piquel.fr/piqueld of dirkengine.fr
authors = ["Piquel <contact@piquel.fr>"]

[dependencies]
anyhow = "1"
thiserror = "2"
time = { version = "0.3", features = ["formatting", "macros"] }
tracing = "0.1"
tracing-subscriber = "0.3"
log = { version = "0.4", optional = true }

[features]
default = []

# All the features
full = ["store", "file"]

# Add the LogStore, for storing & querying of logs
store = []
# Will save logs to file, can be configured
file = []

# Will convert `log` events to tracing events
log = ["dep:log"]

[lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[lints.clippy]
pedantic = "warn"
unwrap_used = "warn"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["-Zunstable-options", "--cfg", "docsrs"]
